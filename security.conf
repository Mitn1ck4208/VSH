# VPS Security Hardener Configuration
# ===================================
# This file contains settings for the hardening script

# SSH Configuration
SSH_PORT=22
DISABLE_ROOT_LOGIN=true
DISABLE_PASSWORD_AUTH=true
ENABLE_PUBLIC_KEY_AUTH=true
DISABLE_EMPTY_PASSWORD=true

# Firewall Settings
ENABLE_UFW=true
DEFAULT_POLICY_INCOMING=deny
DEFAULT_POLICY_OUTGOING=allow
ALLOW_SSH=true

# Intrusion Detection
ENABLE_FAIL2BAN=true
FAIL2BAN_BANTIME=3600
FAIL2BAN_FINDTIME=600
FAIL2BAN_MAXRETRY=5

# System Updates
AUTO_UPDATE=true
UPDATE_PACKAGES=true
UPGRADE_PACKAGES=true

# Disable Services
DISABLE_AVAHI=true
DISABLE_CUPS=true
DISABLE_DHCP_SERVER=true

# Audit Settings
AUDIT_SUID_BINARIES=true
CHECK_SUDO_PERMISSIONS=true

# Logging
LOG_RETENTION_DAYS=30
LOG_COMPRESSION=true
TIMESTAMP_FORMAT="%Y-%m-%d %H:%M:%S"

# Notifications (optional - for future implementation)
SEND_EMAIL_ON_COMPLETION=false
EMAIL_RECIPIENT=""
